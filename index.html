<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dashboard</title>
    <style>
        :root {
            --primary: #dc143c; /* Crimson */
            --bg-dark: #0f0f0f;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #3d0510, #0f0f0f);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: white;
        }

        .glass-card {
            width: 350px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .glass-card h1 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .premium-btn {
            position: relative;
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hiệu ứng đặc biệt khi hover */
        .premium-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(220, 20, 60, 0.3);
        }

        .premium-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transition: 0.5s;
        }

        .premium-btn:hover::before {
            left: 100%;
        }

        /* Nút nổi bật nhất */
        .btn-main {
            background: var(--primary);
            border: none;
        }

    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Hệ Thống Link</h1>
        <div class="btn-stack">
            <a href="https://10minutemail.net/m/?lang=vi" target="_blank" class="premium-btn btn-main">📧 10 Minute Mail</a>
            <a href="https://share.google/sqZ2j1PrIoNF1uu1A" target="_blank" class="premium-btn">🔗 Google Share</a>
            <a href="https://vt.tiktok.com/ZS9xdjkAF/" target="_blank" class="premium-btn">📱 TikTok Video</a>
        </div>
    </div>

</body>
</html>
